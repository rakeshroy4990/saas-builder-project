server.port=${PORT:8080}
# When TLS terminates at a load balancer, forwarded headers make request.isSecure() and HSTS accurate.
server.forward-headers-strategy=${SERVER_FORWARD_HEADERS_STRATEGY:framework}

# MongoDB Atlas env options (never commit secrets):
# - SPRING_DATA_MONGODB_URI: full URI (preferred)
# - OR MONGODB_URL + MONGODB_PASSWORD (MONGODB_URL may include <db_password> token)
# App startup checks these env vars:
# - present -> Mongo auto-config enabled using resolved URI
# - missing -> Mongo auto-config disabled (prevents localhost:27017 monitor errors)
# Mongo DB name (defaults to flexshell unless explicitly overridden).
spring.data.mongodb.database=${APP_MONGODB_DATABASE:flexshell}
logging.level.com.flexshell=${APP_LOG_LEVEL:INFO}
# JWT settings (override via env in production).
app.auth.jwt.secret=${APP_AUTH_JWT_SECRET:change-this-jwt-secret-min-32-bytes}
app.auth.jwt.issuer=${APP_AUTH_JWT_ISSUER:flexshell-hospital}
app.auth.jwt.access-expiration-seconds=${APP_AUTH_JWT_ACCESS_EXPIRATION_SECONDS:900}
app.auth.jwt.refresh-expiration-seconds=${APP_AUTH_JWT_REFRESH_EXPIRATION_SECONDS:2592000}
# Password policy (registration + change-password)
app.auth.password.min-length=${APP_AUTH_PASSWORD_MIN_LENGTH:12}
app.auth.password.require-mixed-character-classes=${APP_AUTH_PASSWORD_REQUIRE_MIXED:true}
# Login brute-force mitigation (per client IP; use gateway/WAF limits for multi-node)
app.auth.login-rate-limit.max-attempts-per-window=${APP_AUTH_LOGIN_RATE_LIMIT_MAX:30}
app.auth.login-rate-limit.window-seconds=${APP_AUTH_LOGIN_RATE_LIMIT_WINDOW_SECONDS:900}
app.auth.cookie.secure=${APP_AUTH_COOKIE_SECURE:false}
app.auth.cookie.same-site=${APP_AUTH_COOKIE_SAME_SITE:Lax}
app.auth.cookie.domain=${APP_AUTH_COOKIE_DOMAIN:}
app.auth.cookie.access-token-name=${APP_AUTH_COOKIE_ACCESS_TOKEN_NAME:access_token}
# When true, access+refresh cookies use SameSite=None + Secure (typical cross-origin SPA + API in production).
app.auth.cookie.cross-site-deployment=${APP_AUTH_COOKIE_CROSS_SITE_DEPLOYMENT:false}
# Cookie max-age (seconds). Refresh should match JWT refresh TTL; access should match access JWT TTL.
app.auth.cookie.refresh-max-age-seconds=${APP_AUTH_COOKIE_REFRESH_MAX_AGE_SECONDS:${APP_AUTH_JWT_REFRESH_EXPIRATION_SECONDS:2592000}}
app.auth.cookie.access-max-age-seconds=${APP_AUTH_COOKIE_ACCESS_MAX_AGE_SECONDS:${APP_AUTH_JWT_ACCESS_EXPIRATION_SECONDS:900}}
# Comma-separated patterns (no spaces required). Example for Render: https://your-ui.onrender.com,https://*.onrender.com
app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,https://localhost:*}
# HTTPS: set APP_AUTH_COOKIE_SECURE=true and terminate TLS at your load balancer; enable HSTS when always HTTPS
app.security.hsts.enabled=${APP_SECURITY_HSTS_ENABLED:false}
app.security.hsts.max-age-seconds=${APP_SECURITY_HSTS_MAX_AGE_SECONDS:31536000}
# CSP on API responses (empty = omit header). Example env: APP_SECURITY_CSP_POLICY=default-src 'none'; base-uri 'none'; frame-ancestors 'none'
app.security.csp.policy=${APP_SECURITY_CSP_POLICY:}
# Field-level AES-256-GCM for structured e-prescription payloads in Mongo (Base64-encoded 32-byte key). Required for production PHI at rest beyond Atlas disk encryption.
app.patient-data.encryption.key=${APP_PATIENT_DATA_ENCRYPTION_KEY:}
app.bootstrap.admin.enabled=${APP_BOOTSTRAP_ADMIN_ENABLED:false}
app.bootstrap.admin.email=${APP_BOOTSTRAP_ADMIN_EMAIL:}
app.bootstrap.admin.password=${APP_BOOTSTRAP_ADMIN_PASSWORD:}
app.bootstrap.admin.first-name=${APP_BOOTSTRAP_ADMIN_FIRST_NAME:System}
app.bootstrap.admin.last-name=${APP_BOOTSTRAP_ADMIN_LAST_NAME:Admin}
app.seed.users.enabled=${APP_SEED_USERS_ENABLED:false}
app.seed.users.default-password=${APP_SEED_USERS_DEFAULT_PASSWORD:ChangeMe123!}
# Local date/time interpretation for doctor schedules and generated booking slots (IANA id).
app.hospital.time-zone=${APP_HOSPITAL_TIME_ZONE:UTC}

# Hospital video: builtin (STOMP + WebRTC) or agora (RTC tokens ONLY from this server — never ship App Certificate to the UI).
# Agora Console: App Certificate OFF = testing only (anyone with App ID can join any channel). Production MUST use Certificate ON + tokens here.
# Use POST /api/appointment/{id}/join-call for Agora: channel name = appointment id, token bound to that channel.
app.video.provider=${APP_VIDEO_PROVIDER:builtin}
app.video.agora.app-id=${APP_VIDEO_AGORA_APP_ID:}
# Required when app.video.provider=agora; empty → Spring fails at startup (no RTC tokens without Certificate ON).
app.video.agora.app-certificate=${APP_VIDEO_AGORA_APP_CERTIFICATE:}
# Capped at 3600s in code; keep ≤ 3600 for RTC privilege expiry.
app.video.agora.token-ttl-seconds=${APP_VIDEO_AGORA_TOKEN_TTL_SECONDS:3600}
# Join-call: allow video only within appointment slot ± this many minutes (hospital time zone).
app.video.join-call-grace-minutes=${APP_VIDEO_JOIN_CALL_GRACE_MINUTES:10}
# Comma-separated appointment Status values allowed to join (case-insensitive). Use CONFIRMED only once you migrate from legacy "Open".
app.video.join-call-allowed-statuses=${APP_VIDEO_JOIN_CALL_ALLOWED_STATUSES:CONFIRMED,Open}
# Max duration from CallStartTime for RTC token renewal without starting a new booking (mid-call).
app.video.call-max-duration-hours=${APP_VIDEO_CALL_MAX_DURATION_HOURS:4}

# Smart AI chat LLM provider settings (all env-overridable).
app.ai.provider=${APP_AI_PROVIDER:openai}
app.ai.system-prompt=${APP_AI_SYSTEM_PROMPT:}
app.ai.timeout-ms=${APP_AI_TIMEOUT_MS:12000}
app.ai.max-tokens=${APP_AI_MAX_TOKENS:400}
app.ai.temperature=${APP_AI_TEMPERATURE:0.3}

# OpenAI
app.ai.openai.api-key=${APP_AI_OPENAI_API_KEY:}
app.ai.openai.model=${APP_AI_OPENAI_MODEL:gpt-4o-mini}
app.ai.openai.base-url=${APP_AI_OPENAI_BASE_URL:https://api.openai.com}
app.ai.openai.chat-path=${APP_AI_OPENAI_CHAT_PATH:/v1/chat/completions}

# Gemini
app.ai.gemini.api-key=${APP_AI_GEMINI_API_KEY:}
app.ai.gemini.model=${APP_AI_GEMINI_MODEL:gemini-1.5-flash}
app.ai.gemini.base-url=${APP_AI_GEMINI_BASE_URL:https://generativelanguage.googleapis.com}
app.ai.gemini.chat-path-template=${APP_AI_GEMINI_CHAT_PATH_TEMPLATE:/v1beta/models/%s:generateContent}

# Claude (Anthropic)
app.ai.claude.api-key=${APP_AI_CLAUDE_API_KEY:}
app.ai.claude.model=${APP_AI_CLAUDE_MODEL:claude-3-5-sonnet-latest}
app.ai.claude.base-url=${APP_AI_CLAUDE_BASE_URL:https://api.anthropic.com}
app.ai.claude.chat-path=${APP_AI_CLAUDE_CHAT_PATH:/v1/messages}
app.ai.claude.version=${APP_AI_CLAUDE_VERSION:2023-06-01}

# PDF-RAG bridge for Smart AI chat (query -> retrieve chunks -> context -> LLM -> answer).
app.ai.rag.enabled=${APP_AI_RAG_ENABLED:true}
app.ai.rag.base-url=${APP_AI_RAG_BASE_URL:http://localhost:8090}
app.ai.rag.query-path=${APP_AI_RAG_QUERY_PATH:/api/v1/query}
app.ai.rag.retry-attempts=${APP_AI_RAG_RETRY_ATTEMPTS:2}
app.ai.rag.retry-backoff-ms=${APP_AI_RAG_RETRY_BACKOFF_MS:600}

# Smart AI per-user limits (UTC calendar day for request counts; token estimate ~ chars/4 on message + history).
app.ai.smart.max-requests-per-day=${APP_AI_SMART_MAX_REQUESTS_PER_DAY:15}
app.ai.smart.max-input-tokens-per-request=${APP_AI_SMART_MAX_INPUT_TOKENS_PER_REQUEST:1200}

# Outbound email (internal email-notify HTTP server, Resend, etc.).
# Example: cd packages/email-notify && npm run build && npm run serve:hospital-appointment-email
# Set RESEND_API_KEY, EMAIL_FROM_ADDRESS, APP_BASE_URL in packages/email-notify/.env (or env).
app.email.enabled=${APP_EMAIL_ENABLED:true}
app.email.internal-base-url=${APP_EMAIL_INTERNAL_BASE_URL:http://localhost:8787}
app.email.portal-base-url=${APP_EMAIL_PORTAL_BASE_URL:http://localhost:5174}
app.email.internal-secret=${APP_EMAIL_INTERNAL_SECRET:}

# Sentry (disabled by default; enable via env in deployed environments).
sentry.enabled=${SENTRY_ENABLED:false}
sentry.dsn=${SENTRY_DSN:}
sentry.environment=${SENTRY_ENVIRONMENT:local}
sentry.traces-sample-rate=${SENTRY_TRACES_SAMPLE_RATE:0.0}
sentry.send-default-pii=${SENTRY_SEND_DEFAULT_PII:false}

# YouTube Data API v3 (hero video search; key server-side only — never expose in frontend env).
app.youtube.api-key=${YOUTUBE_API_KEY:AIzaSyACsuyYvdPPieUm7wXbPWTwjKxZa4Htc3g}
app.youtube.channel-handle=${APP_YOUTUBE_CHANNEL_HANDLE:LittleSproutsCare_DrSwati}
# In-process search result cache (ms) to reduce quota usage.
app.youtube.search-cache-ttl-ms=${APP_YOUTUBE_SEARCH_CACHE_TTL_MS:300000}
# Empty hero query: list the N newest channel uploads (max 50), then choose one:
#   APP_YOUTUBE_HERO_RANK_BY=RANDOM (default) — uniform random index in 1..min(30, N) (newest = 1).
#   APP_YOUTUBE_HERO_RANK_BY=VIEWS — video with highest viewCount in that pool.
#   APP_YOUTUBE_HERO_RANK_BY=LIKES — video with highest likeCount in that pool.
app.youtube.hero-recent-pool-size=${APP_YOUTUBE_HERO_RECENT_POOL_SIZE:30}
app.youtube.hero-rank-by=${APP_YOUTUBE_HERO_RANK_BY:RANDOM}
# Shared Mongo database that owns `query_cache` (used by PDF-RAG + hero YouTube query cache rows).
app.youtube.query-cache.database=${APP_YOUTUBE_QUERY_CACHE_DATABASE:rag_db}
