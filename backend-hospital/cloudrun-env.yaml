# Non-secret env vars for Cloud Run (gcloud run deploy --env-vars-file).
# Format matches Spring Boot relaxed binding for keys in application.properties (${ENV_NAME} placeholders).
# Sensitive values: use Secret Manager + --set-secrets (see ../cloudbuild.yaml); do not commit secrets here.

# --- server.* ---
# PORT is set automatically by Cloud Run; omit or override only for local parity.
SERVER_FORWARD_HEADERS_STRATEGY: framework

# --- spring.data.mongodb.* ---
# Prefer SPRING_DATA_MONGODB_URI from Secret Manager for Atlas (full connection string).
# APP_MONGODB_DATABASE names the DB when using a URI without explicit database segment.
APP_MONGODB_DATABASE: flexshell

# --- logging ---
APP_LOG_LEVEL: INFO

# --- app.auth.jwt.* ---
# APP_AUTH_JWT_SECRET: set via Secret Manager (min 32 bytes); never commit.
APP_AUTH_JWT_ISSUER: flexshell-hospital
APP_AUTH_JWT_ACCESS_EXPIRATION_SECONDS: "900"
APP_AUTH_JWT_REFRESH_EXPIRATION_SECONDS: "2592000"

# --- app.auth.password.* ---
APP_AUTH_PASSWORD_MIN_LENGTH: "12"
APP_AUTH_PASSWORD_REQUIRE_MIXED: "true"

# --- app.auth.login-rate-limit.* ---
APP_AUTH_LOGIN_RATE_LIMIT_MAX: "30"
APP_AUTH_LOGIN_RATE_LIMIT_WINDOW_SECONDS: "900"

# --- app.auth.cookie.* (production: APP_AUTH_COOKIE_SECURE=true behind HTTPS) ---
APP_AUTH_COOKIE_SECURE: "true"
APP_AUTH_COOKIE_SAME_SITE: Lax
APP_AUTH_COOKIE_DOMAIN: ""
APP_AUTH_COOKIE_ACCESS_TOKEN_NAME: access_token

# --- app.cors.* ---
APP_CORS_ALLOWED_ORIGIN_PATTERNS: "https://agastyahealthcare.com,https://www.agastyahealthcare.com,https://oshucare-clinic.web.app,https://oshu-ai-clinic-ui.onrender.com,https://*.onrender.com,http://localhost:5173"

# --- app.security.* ---
APP_SECURITY_HSTS_ENABLED: "true"
APP_SECURITY_HSTS_MAX_AGE_SECONDS: "31536000"
# CSP on API responses (empty = omit). Example: default-src 'none'; base-uri 'none'; frame-ancestors 'none'
APP_SECURITY_CSP_POLICY: ""

# --- app.patient-data.encryption.* ---
# APP_PATIENT_DATA_ENCRYPTION_KEY: Base64 32-byte key via Secret Manager for PHI field encryption.

# --- app.bootstrap.admin.* ---
APP_BOOTSTRAP_ADMIN_ENABLED: "false"
APP_BOOTSTRAP_ADMIN_EMAIL: ""
APP_BOOTSTRAP_ADMIN_PASSWORD: ""
APP_BOOTSTRAP_ADMIN_FIRST_NAME: System
APP_BOOTSTRAP_ADMIN_LAST_NAME: Admin

# --- app.seed.users.* ---
APP_SEED_USERS_ENABLED: "false"
APP_SEED_USERS_DEFAULT_PASSWORD: ChangeMe123!

# --- app.hospital.* ---
APP_HOSPITAL_TIME_ZONE: UTC

# --- app.video.* ---
# agora: JVM requires APP_VIDEO_AGORA_APP_ID + APP_VIDEO_AGORA_APP_CERTIFICATE at startup when provider=agora.
APP_VIDEO_PROVIDER: agora
APP_VIDEO_AGORA_APP_ID: "383d01ff66e543e4892bcfb6b9844a8b"
# APP_VIDEO_AGORA_APP_CERTIFICATE: inject only via deploy --set-secrets (e.g. backend-hospital-app-video-agora-certificate).
APP_VIDEO_AGORA_TOKEN_TTL_SECONDS: "3600"
APP_VIDEO_JOIN_CALL_GRACE_MINUTES: "10"
APP_VIDEO_JOIN_CALL_ALLOWED_STATUSES: "CONFIRMED,Open"
APP_VIDEO_CALL_MAX_DURATION_HOURS: "4"

# --- app.ai.* (provider + shared) ---
APP_AI_PROVIDER: openai
APP_AI_SYSTEM_PROMPT: ""
APP_AI_TIMEOUT_MS: "12000"
APP_AI_MAX_TOKENS: "400"
APP_AI_TEMPERATURE: "0.3"

# --- app.ai.openai.* ---
# APP_AI_OPENAI_API_KEY: Secret Manager recommended.
APP_AI_OPENAI_MODEL: gpt-4o-mini
APP_AI_OPENAI_BASE_URL: https://api.openai.com
APP_AI_OPENAI_CHAT_PATH: /v1/chat/completions

# --- app.ai.gemini.* ---
# APP_AI_GEMINI_API_KEY: Secret Manager recommended.
APP_AI_GEMINI_MODEL: gemini-1.5-flash
APP_AI_GEMINI_BASE_URL: https://generativelanguage.googleapis.com
APP_AI_GEMINI_CHAT_PATH_TEMPLATE: /v1beta/models/%s:generateContent

# --- app.ai.claude.* ---
# APP_AI_CLAUDE_API_KEY: Secret Manager recommended.
APP_AI_CLAUDE_MODEL: claude-3-5-sonnet-latest
APP_AI_CLAUDE_BASE_URL: https://api.anthropic.com
APP_AI_CLAUDE_CHAT_PATH: /v1/messages
APP_AI_CLAUDE_VERSION: "2023-06-01"

# --- app.ai.rag.* ---
APP_AI_RAG_ENABLED: "true"
APP_AI_RAG_BASE_URL: https://pdf-rag-pipeline-yspwmymsgq-el.a.run.app
APP_AI_RAG_QUERY_PATH: /api/v1/query
APP_AI_RAG_RETRY_ATTEMPTS: "2"
APP_AI_RAG_RETRY_BACKOFF_MS: "600"

# --- app.ai.smart.* ---
APP_AI_SMART_MAX_REQUESTS_PER_DAY: "15"
APP_AI_SMART_MAX_INPUT_TOKENS_PER_REQUEST: "1200"

# --- app.email.* ---
APP_EMAIL_ENABLED: "true"
APP_EMAIL_INTERNAL_BASE_URL: https://email-notify-yspwmymsgq-el.a.run.app
APP_EMAIL_PORTAL_BASE_URL: https://agastyahealthcare.com
# APP_EMAIL_INTERNAL_SECRET: shared secret with email-notify; use Secret Manager.

# --- sentry.* ---
SENTRY_ENABLED: "true"
SENTRY_DSN: https://13c8f9a52f54d607d42214e4e936f653@o4511297937539072.ingest.us.sentry.io/4511297943306240
SENTRY_ENVIRONMENT: production
SENTRY_TRACES_SAMPLE_RATE: "0"
SENTRY_SEND_DEFAULT_PII: "false"

# --- app.youtube.* ---
# YOUTUBE_API_KEY: Secret Manager (never commit; application.properties default is dev-only).
APP_YOUTUBE_CHANNEL_HANDLE: LittleSproutsCare_DrSwati
APP_YOUTUBE_SEARCH_CACHE_TTL_MS: "300000"
APP_YOUTUBE_HERO_RECENT_POOL_SIZE: "30"
APP_YOUTUBE_HERO_RANK_BY: RANDOM
APP_YOUTUBE_QUERY_CACHE_DATABASE: rag_db
