# Cloud Run env: committed *.yaml (non-secret) + Secret Manager (--set-secrets).
#
# backend-hospital — create secrets (never commit values):
#   printf %s 'mongodb+srv://...' | gcloud secrets create backend-hospital-spring-data-mongodb-uri --data-file=-
#   Postgres (APP_PERSISTENCE_PROVIDER=postgres): JDBC URL must start with jdbc:postgresql://
#   printf %s 'jdbc:postgresql://...pooler...:5432/postgres?sslmode=require' | gcloud secrets create backend-hospital-spring-datasource-url --data-file=-
#   printf %s 'your-db-password' | gcloud secrets create backend-hospital-spring-datasource-password --data-file=-
#   (Omit the password secret if the JDBC URL already embeds user:password.)
#   printf %s 'your-jwt-secret' | gcloud secrets create backend-hospital-app-auth-jwt-secret --data-file=-
#   printf %s 'agora-cert' | gcloud secrets create backend-hospital-app-video-agora-certificate --data-file=-
#   printf %s 'AIza...' | gcloud secrets create backend-hospital-app-ai-gemini-api-key --data-file=-
#   printf %s 'AIza...' | gcloud secrets create backend-hospital-youtube-api-key --data-file=-   # YouTube Data API v3 (app.youtube.api-key / YOUTUBE_API_KEY)
#   printf %s 'internal-email-secret' | gcloud secrets create backend-hospital-app-email-internal-secret --data-file=-
#   printf %s 're_...' | gcloud secrets create email-notify-resend-api-key --data-file=-
#
# pdf-rag-pipeline — create secrets:
#   printf %s 'mongodb+srv://...' | gcloud secrets create pdf-rag-pipeline-mongo-uri --data-file=-
#   printf %s 'jwt-signing-secret' | gcloud secrets create pdf-rag-pipeline-jwt-secret --data-file=-
#   printf %s 'sk-...' | gcloud secrets create pdf-rag-pipeline-openai-api-key --data-file=-
#   Postgres (cloudrun-env APP_PERSISTENCE_PROVIDER=postgres): libpq URL, e.g. postgresql://user:pass@host:5432/db?sslmode=require
#   printf %s 'postgresql://postgres.PROJECT:PASSWORD@aws-0-REGION.pooler.supabase.com:5432/postgres?sslmode=require' | gcloud secrets create pdf-rag-pipeline-database-url --data-file=-
#
# Grant Cloud Run runtime SA secretAccessor (replace PROJECT_NUMBER):
#   RUNTIME_SA="PROJECT_NUMBER-compute@developer.gserviceaccount.com"
#   for s in \
#     backend-hospital-spring-data-mongodb-uri backend-hospital-spring-datasource-url \
#     backend-hospital-app-auth-jwt-secret \
#     backend-hospital-app-video-agora-certificate backend-hospital-app-ai-gemini-api-key \
#     backend-hospital-youtube-api-key backend-hospital-app-email-internal-secret \
#     email-notify-resend-api-key \
#     pdf-rag-pipeline-mongo-uri pdf-rag-pipeline-database-url pdf-rag-pipeline-jwt-secret \
#     pdf-rag-pipeline-openai-api-key pdf-rag-pipeline-gemini-api-key; do
#     gcloud secrets add-iam-policy-binding "$s" --member="serviceAccount:${RUNTIME_SA}" --role="roles/secretmanager.secretAccessor"
#   done

steps:
  # ── backend-hospital: build ───────────────────────────────────
  - id: build-backend
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --cache-from
      - asia-south1-docker.pkg.dev/oshucare/oshucare/backend-hospital:latest
      - -t
      - asia-south1-docker.pkg.dev/oshucare/oshucare/backend-hospital:$SHORT_SHA
      - -t
      - asia-south1-docker.pkg.dev/oshucare/oshucare/backend-hospital:latest
      - -f
      - backend-hospital/Dockerfile
      - .

  # ── pdf-rag-pipeline: build (parallel with backend push+deploy) ──
  - id: build-rag
    name: gcr.io/cloud-builders/docker
    waitFor: ['-']   # starts immediately, parallel to build-backend
    args:
      - build
      - --cache-from
      - asia-south1-docker.pkg.dev/oshucare/oshucare/pdf-rag-pipeline:latest
      - -t
      - asia-south1-docker.pkg.dev/oshucare/oshucare/pdf-rag-pipeline:$SHORT_SHA
      - -t
      - asia-south1-docker.pkg.dev/oshucare/oshucare/pdf-rag-pipeline:latest
      - -f
      - pdf-rag-pipeline/Dockerfile
      - .

  # ── email-notify: build (parallel) ─────────────────────────────
  - id: build-email-notify
    name: gcr.io/cloud-builders/docker
    waitFor: ['-']
    args:
      - build
      - --cache-from
      - asia-south1-docker.pkg.dev/oshucare/oshucare/email-notify:latest
      - -t
      - asia-south1-docker.pkg.dev/oshucare/oshucare/email-notify:$SHORT_SHA
      - -t
      - asia-south1-docker.pkg.dev/oshucare/oshucare/email-notify:latest
      - -f
      - packages/email-notify/Dockerfile
      - packages/email-notify

  # ── backend-hospital: push ────────────────────────────────────
  - id: push-backend
    name: gcr.io/cloud-builders/docker
    waitFor: [build-backend]
    args:
      - push
      - --all-tags
      - asia-south1-docker.pkg.dev/oshucare/oshucare/backend-hospital

  # ── pdf-rag-pipeline: push ────────────────────────────────────
  - id: push-rag
    name: gcr.io/cloud-builders/docker
    waitFor: [build-rag]
    args:
      - push
      - --all-tags
      - asia-south1-docker.pkg.dev/oshucare/oshucare/pdf-rag-pipeline

  # ── email-notify: push ────────────────────────────────────────
  - id: push-email-notify
    name: gcr.io/cloud-builders/docker
    waitFor: [build-email-notify]
    args:
      - push
      - --all-tags
      - asia-south1-docker.pkg.dev/oshucare/oshucare/email-notify

  # ── backend-hospital: deploy ──────────────────────────────────
  - id: deploy-backend
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    waitFor: [push-backend]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - backend-hospital
      - --image
      - asia-south1-docker.pkg.dev/oshucare/oshucare/backend-hospital:$SHORT_SHA
      - --region
      - asia-south1
      - --platform
      - managed
      - --allow-unauthenticated
      - --env-vars-file
      - backend-hospital/cloudrun-env.yaml
      # When APP_VIDEO_PROVIDER=agora (cloudrun-env), backend-hospital fails fast at startup if this secret is missing/empty.
      - --set-secrets
      - SPRING_DATA_MONGODB_URI=backend-hospital-spring-data-mongodb-uri:latest,SPRING_DATASOURCE_URL=backend-hospital-spring-datasource-url:latest,APP_AUTH_JWT_SECRET=backend-hospital-app-auth-jwt-secret:latest,APP_VIDEO_AGORA_APP_CERTIFICATE=backend-hospital-app-video-agora-certificate:latest,CLOUDINARY_URL=backend-hospital-cloudinary-url:latest,YOUTUBE_API_KEY=backend-hospital-youtube-api-key:latest,APP_EMAIL_INTERNAL_SECRET=backend-hospital-app-email-internal-secret:latest
      - --quiet

  # ── pdf-rag-pipeline: deploy ──────────────────────────────────
  - id: deploy-rag
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    waitFor: [push-rag]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - pdf-rag-pipeline
      - --image
      - asia-south1-docker.pkg.dev/oshucare/oshucare/pdf-rag-pipeline:$SHORT_SHA
      - --region
      - asia-south1
      - --platform
      - managed
      - --allow-unauthenticated
      - --env-vars-file
      - pdf-rag-pipeline/cloudrun-env.yaml
      - --set-secrets
      - MONGO_URI=pdf-rag-pipeline-mongo-uri:latest,DATABASE_URL=pdf-rag-pipeline-database-url:latest,JWT_SECRET=pdf-rag-pipeline-jwt-secret:latest,OPENAI_API_KEY=pdf-rag-pipeline-openai-api-key:latest
      - --quiet

  # ── email-notify: deploy ──────────────────────────────────────
  - id: deploy-email-notify
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    waitFor: [push-email-notify]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - email-notify
      - --image
      - asia-south1-docker.pkg.dev/oshucare/oshucare/email-notify:$SHORT_SHA
      - --region
      - asia-south1
      - --platform
      - managed
      - --allow-unauthenticated
      - --env-vars-file
      - packages/email-notify/cloudrun-env.yaml
      - --set-secrets
      - RESEND_API_KEY=email-notify-resend-api-key:latest,EMAIL_INTERNAL_SECRET=backend-hospital-app-email-internal-secret:latest
      - --quiet

images:
  - asia-south1-docker.pkg.dev/oshucare/oshucare/backend-hospital
  - asia-south1-docker.pkg.dev/oshucare/oshucare/pdf-rag-pipeline
  - asia-south1-docker.pkg.dev/oshucare/oshucare/email-notify

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8   # faster CPU for parallel builds