steps:
  # ── backend-hospital ─────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - asia-south1-docker.pkg.dev/oshucare/oshucare/backend-hospital:$COMMIT_SHA
      - -t
      - asia-south1-docker.pkg.dev/oshucare/oshucare/backend-hospital:latest
      - -f
      - backend-hospital/Dockerfile
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - asia-south1-docker.pkg.dev/oshucare/oshucare/backend-hospital

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - backend-hospital
      - --image
      - asia-south1-docker.pkg.dev/oshucare/oshucare/backend-hospital:$COMMIT_SHA
      - --region
      - asia-south1
      - --platform
      - managed
      - --quiet

  # ── pdf-rag-pipeline ──────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - asia-south1-docker.pkg.dev/oshucare/oshucare/pdf-rag-pipeline:$COMMIT_SHA
      - -t
      - asia-south1-docker.pkg.dev/oshucare/oshucare/pdf-rag-pipeline:latest
      - -f
      - pdf-rag-pipeline/Dockerfile
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - asia-south1-docker.pkg.dev/oshucare/oshucare/pdf-rag-pipeline

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - pdf-rag-pipeline
      - --image
      - asia-south1-docker.pkg.dev/oshucare/oshucare/pdf-rag-pipeline:$COMMIT_SHA
      - --region
      - asia-south1
      - --platform
      - managed
      - --quiet

images:
  - asia-south1-docker.pkg.dev/oshucare/oshucare/backend-hospital
  - asia-south1-docker.pkg.dev/oshucare/oshucare/pdf-rag-pipeline

options:
  logging: CLOUD_LOGGING_ONLY