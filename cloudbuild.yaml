# Cloud Run env: committed *.yaml (non-secret) + Secret Manager (--set-secrets).
#
# backend-hospital — create secrets (never commit values):
#   printf %s 'mongodb+srv://...' | gcloud secrets create backend-hospital-spring-data-mongodb-uri --data-file=-
#   printf %s 'your-jwt-secret' | gcloud secrets create backend-hospital-app-auth-jwt-secret --data-file=-
#   printf %s 'agora-cert' | gcloud secrets create backend-hospital-app-video-agora-certificate --data-file=-
#   printf %s 'AIza...' | gcloud secrets create backend-hospital-app-ai-gemini-api-key --data-file=-
#
# pdf-rag-pipeline — create secrets:
#   printf %s 'mongodb+srv://...' | gcloud secrets create pdf-rag-pipeline-mongo-uri --data-file=-
#   printf %s 'jwt-signing-secret' | gcloud secrets create pdf-rag-pipeline-jwt-secret --data-file=-
#   printf %s 'sk-...' | gcloud secrets create pdf-rag-pipeline-openai-api-key --data-file=-
#
# Grant Cloud Run runtime SA secretAccessor (replace PROJECT_NUMBER):
#   RUNTIME_SA="PROJECT_NUMBER-compute@developer.gserviceaccount.com"
#   for s in \
#     backend-hospital-spring-data-mongodb-uri backend-hospital-app-auth-jwt-secret \
#     backend-hospital-app-video-agora-certificate backend-hospital-app-ai-gemini-api-key \
#     pdf-rag-pipeline-mongo-uri pdf-rag-pipeline-jwt-secret \
#     pdf-rag-pipeline-openai-api-key pdf-rag-pipeline-gemini-api-key; do
#     gcloud secrets add-iam-policy-binding "$s" --member="serviceAccount:${RUNTIME_SA}" --role="roles/secretmanager.secretAccessor"
#   done

steps:
  # ── backend-hospital: build ───────────────────────────────────
  - id: build-backend
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --cache-from
      - asia-south1-docker.pkg.dev/oshucare/oshucare/backend-hospital:latest
      - -t
      - asia-south1-docker.pkg.dev/oshucare/oshucare/backend-hospital:$SHORT_SHA
      - -t
      - asia-south1-docker.pkg.dev/oshucare/oshucare/backend-hospital:latest
      - -f
      - backend-hospital/Dockerfile
      - .

  # ── pdf-rag-pipeline: build (parallel with backend push+deploy) ──
  - id: build-rag
    name: gcr.io/cloud-builders/docker
    waitFor: ['-']   # starts immediately, parallel to build-backend
    args:
      - build
      - --cache-from
      - asia-south1-docker.pkg.dev/oshucare/oshucare/pdf-rag-pipeline:latest
      - -t
      - asia-south1-docker.pkg.dev/oshucare/oshucare/pdf-rag-pipeline:$SHORT_SHA
      - -t
      - asia-south1-docker.pkg.dev/oshucare/oshucare/pdf-rag-pipeline:latest
      - -f
      - pdf-rag-pipeline/Dockerfile
      - .

  # ── backend-hospital: push ────────────────────────────────────
  - id: push-backend
    name: gcr.io/cloud-builders/docker
    waitFor: [build-backend]
    args:
      - push
      - --all-tags
      - asia-south1-docker.pkg.dev/oshucare/oshucare/backend-hospital

  # ── pdf-rag-pipeline: push ────────────────────────────────────
  - id: push-rag
    name: gcr.io/cloud-builders/docker
    waitFor: [build-rag]
    args:
      - push
      - --all-tags
      - asia-south1-docker.pkg.dev/oshucare/oshucare/pdf-rag-pipeline

  # ── backend-hospital: deploy ──────────────────────────────────
  - id: deploy-backend
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    waitFor: [push-backend]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - backend-hospital
      - --image
      - asia-south1-docker.pkg.dev/oshucare/oshucare/backend-hospital:$SHORT_SHA
      - --region
      - asia-south1
      - --platform
      - managed
      - --allow-unauthenticated
      - --env-vars-file
      - backend-hospital/cloudrun-env.yaml
      - --set-secrets
      - SPRING_DATA_MONGODB_URI=backend-hospital-spring-data-mongodb-uri:latest,APP_AUTH_JWT_SECRET=backend-hospital-app-auth-jwt-secret:latest,APP_VIDEO_AGORA_APP_CERTIFICATE=backend-hospital-app-video-agora-certificate:latest,CLOUDINARY_URL=backend-hospital-cloudinary-url:latest
      - --quiet

  # ── pdf-rag-pipeline: deploy ──────────────────────────────────
  - id: deploy-rag
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    waitFor: [push-rag]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - pdf-rag-pipeline
      - --image
      - asia-south1-docker.pkg.dev/oshucare/oshucare/pdf-rag-pipeline:$SHORT_SHA
      - --region
      - asia-south1
      - --platform
      - managed
      - --allow-unauthenticated
      - --env-vars-file
      - pdf-rag-pipeline/cloudrun-env.yaml
      - --set-secrets
      - MONGO_URI=pdf-rag-pipeline-mongo-uri:latest,JWT_SECRET=pdf-rag-pipeline-jwt-secret:latest,OPENAI_API_KEY=pdf-rag-pipeline-openai-api-key:latest
      - --quiet

images:
  - asia-south1-docker.pkg.dev/oshucare/oshucare/backend-hospital
  - asia-south1-docker.pkg.dev/oshucare/oshucare/pdf-rag-pipeline

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8   # faster CPU for parallel builds