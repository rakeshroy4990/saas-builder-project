# Coturn — local WebRTC TURN/STUN (development).
# From another device on your LAN, set external-ip to this machine’s LAN IP (see README).

listening-port=3478
listening-ip=0.0.0.0
relay-ip=0.0.0.0

min-port=49160
max-port=49180

verbose
fingerprint
lt-cred-mech
realm=local

# Browser RTCIceServer: username "webrtc", credential "changeme" (rotate for anything beyond local dev).
user=webrtc:changeme

# Uncomment and set your LAN IP when the doctor/patient browsers are not on the same host as Docker:
# external-ip=192.168.1.10
