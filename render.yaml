# Render Blueprint (Infrastructure as Code): https://render.com/docs/infrastructure-as-code
# After connecting the repo: Dashboard → Blueprints → New Blueprint Instance → select this file.
# Monorepo note: the frontend build runs from repo root so npm can resolve file:../packages and Vite can resolve ../frontend-realtime-lib.

services:
  - type: web
    name: hospital-backend
    runtime: docker
    region: oregon
    # Omit `plan` here: Blueprint sync often rejects `plan: free` for `runtime: docker`. After the service
    # exists, set Instance Type to **Free** in the dashboard (or create this Web Service manually and pick Free).
    dockerfilePath: ./render/Dockerfile.backend-hospital
    dockerContext: .
    healthCheckPath: /api/medical-department/get
    envVars:
      - key: SPRING_DATA_MONGODB_URI
        sync: false
      - key: APP_AUTH_JWT_SECRET
        generateValue: true
      - key: APP_CORS_ALLOWED_ORIGIN_PATTERNS
        # Example: https://your-frontend.onrender.com,https://*.onrender.com,http://localhost:5173
        sync: false
      - key: APP_AUTH_COOKIE_SECURE
        value: "true"

  # Static sites are served globally; `region` is not allowed (unlike web services).
  - type: web
    name: hospital-frontend
    runtime: static
    # Static sites have no instance `plan` in Blueprints (always free at the edge; see Render docs).
    # Use `npm run build:render` (not `npm ci`) — see frontend-hospital/package.json `build:render` script.
    buildCommand: cd frontend-hospital && npm run build:render
    staticPublishPath: ./frontend-hospital/dist
    # Client-side routes (/page/...) need index.html; existing files under /assets/ are still served.
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_SPRING_API_BASE_URL
        sync: false
    buildFilter:
      paths:
        - frontend-hospital/**
        - packages/vue-async-ui/**
        - frontend-realtime-lib/**
